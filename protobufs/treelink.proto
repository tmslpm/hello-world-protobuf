syntax = "proto3";

import "buf/validate/validate.proto";

message Link {

  string url = 1;

  string label = 2;

  string title = 3;

}

message Doc {

  int32 version = 1 [(buf.validate.field).required = true];

  string title = 2;

  string content = 3;

  string author = 4;

  repeated Link links = 5;

}
