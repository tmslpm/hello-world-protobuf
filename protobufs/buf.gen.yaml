# Learn more: https://buf.build/docs/configuration/v2/buf-gen-yaml

version: v2

clean: true

inputs:
  - directory: protobufs

plugins:
  - remote: buf.build/bufbuild/es:v2.5.1
    out: src/generated/protobufs
    opt:
      - target=ts
      - import_extension=js
    include_imports: true
